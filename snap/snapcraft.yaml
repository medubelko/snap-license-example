name: dump-license-test
base: core26
version: '0.1'
summary: &summary A demo snap for copying licenses
description: *summary
grade: devel
confinement: devmode

parts:
  license-root-file:  # Copy the license file at the root of a repo
    plugin: dump
    source: .
    stage:
      - LICENSE  # Ignore everything except the destination file

  license-fhs-file:  # Copy the license file at the root of a repo into a FHS-compliant dir
    plugin: dump
    source: .
    organize:
      "LICENSE": usr/share/doc/foo/
    stage:
      - usr/share/doc/foo/  # Ignore everything except the destination dir

  license-usr-dir:  # Copy license that's already in the right place in the file tree
    plugin: dump
    source: .
    source-subdir: usr/share/doc/foo
    prime:  # Snapcraft copies the files into the root of the snap, which I think is a bug. This blocks that.
      - -license-gpl.txt
      - -license-mit.txt
